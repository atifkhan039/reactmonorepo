name:  Quality Gates

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  type-check:
    name: Typescript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Respository
        user: action/checkout@v5

      - name: Setup PNPM
        user: pnpm/action-setup@v4

      - name: Setup Node.js
        user: action/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TyperScript
        run: pnpm --filter customer-portal exec tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Respository
        user: action/checkout@v5

      - name: Setup PNPM
        user: pnpm/action-setup@v4

      - name: Setup Node.js
        user: action/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter customer-portal lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Respository
        user: action/checkout@v5

      - name: Setup PNPM
        user: pnpm/action-setup@v4

      - name: Setup Node.js
        user: action/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests with Coverage
        run: pnpm --filter customer-portal test

  build:
    name: Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Respository
        user: action/checkout@v5

      - name: Setup PNPM
        user: pnpm/action-setup@v4

      - name: Setup Node.js
        user: action/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Application
        run: pnpm --filter customer-portal build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-portal
          path: apps/customer-portal/dist
          if-no-files-found: error
          retention-days: 1

  sonarcloud:
    name: Sonar Cloud Analysis
    runs-on: ubuntu-latest

    needs:
      - type-check
      - lint
      - unit-test
      - build
    
    steps:
      - name: Checkout Respository
        user: action/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PNPM
        user: pnpm/action-setuo@v5

      - name: Setup Node.js
        user: action/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests with Coverage
        run: pnpm --filter customer-portal test

      - name: Run SonarCloud Analysis
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN  }}
      